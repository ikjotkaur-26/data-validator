<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart CSV Validator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="card glass mt-5 p-4">

        <h1 class="text-center title">📊 Smart CSV Validator</h1>
        <p class="text-center subtitle">Upload your CSV file and detect errors instantly</p>

        <form method="POST" enctype="multipart/form-data" class="text-center mt-4">
            <input type="file" name="file" class="form-control mb-3" required>
            <button type="submit" class="btn btn-primary btn-lg">
                Upload & Validate
            </button>
        </form>

    </div>

    {% if errors %}
    <div class="card mt-4 p-3 error-box">
        <h4>⚠️ Errors Found:</h4>
        <ul>
            {% for error in errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    {% if table %}
    <div class="card mt-4 p-3">
        <h4>📄 File Preview:</h4>
        {{ table | safe }}
    </div>
    {% endif %}

</div>

</body>
</html>
